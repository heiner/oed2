<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OED2</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="preconnect" href="https://misty-heart-2775.heiner-a97.workers.dev" crossorigin>
    <link rel="preload" as="fetch" href="./prefix-completions.json" crossorigin>
    <link rel="stylesheet" href="./src/style.css">
  </head>
  <body>
    <div id="app" data-mode="home">
      <main class="search-zone">
        <a href="#" id="brand" class="brand">OED<sup>2</sup></a>
        <form class="search-box" role="search" autocomplete="off">
          <input
            id="query"
            type="search"
            spellcheck="false"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            autofocus
            aria-label="Look up a word"
            aria-autocomplete="list"
            aria-controls="suggestions"
          >
          <ul id="suggestions" role="listbox" hidden></ul>
        </form>
        <div id="status" class="status" aria-live="polite"></div>
      </main>

      <section class="article-zone" aria-label="Article">
        <header class="article-header">
          <h1 id="article-title"></h1>
          <p id="article-meta"></p>
        </header>
        <div id="article" class="article-body"></div>
      </section>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
